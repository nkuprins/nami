spring:
  application:
    name: backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/baltnami}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 0  # drain idle connections so Neon compute can autosuspend
      idle-timeout: 30000
      max-lifetime: 900000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${SHOW_SQL:false}
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 16

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  s3:
    bucket: ${S3_BUCKET:baltnami-uploads}
    region: ${AWS_REGION:eu-north-1}
    presign-ttl-minutes: 15
    cdn-url: ${CDN_URL:https://d1id7q5hh5gcqc.cloudfront.net}
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-32plus}
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
  resend:
    api-key: ${RESEND_API_KEY:}
    from: ${RESEND_FROM:onboarding@resend.dev}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cookie:
    secure: ${COOKIE_SECURE:false}
