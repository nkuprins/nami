spring:
  application:
    name: backend
  # Role fail-safe: an instance with no SPRING_PROFILES_ACTIVE runs as web+scheduler (jobs on).
  # A worker overrides this with SPRING_PROFILES_ACTIVE=worker (scheduler off, listener on).
  profiles:
    default: scheduler
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/baltnami}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 0  # drain idle connections so Neon compute can autosuspend
      idle-timeout: 30000
      max-lifetime: 900000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${SHOW_SQL:false}
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 16
  rabbitmq:
    addresses: ${RABBITMQ_ADDRESSES:amqp://guest:guest@localhost:5672}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2s
          multiplier: 2
        default-requeue-rejected: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  s3:
    bucket: ${S3_BUCKET:baltnami-uploads}
    region: ${AWS_REGION:eu-north-1}
    presign-ttl-minutes: 15
    cdn-url: ${CDN_URL:https://d1id7q5hh5gcqc.cloudfront.net}
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-32plus}
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
  resend:
    api-key: ${RESEND_API_KEY:}
    from: ${RESEND_FROM:onboarding@resend.dev}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cookie:
    secure: ${COOKIE_SECURE:false}
  turnstile:
    secret-key: ${TURNSTILE_SECRET_KEY:}
  # Google Sign-In: OAuth 2.0 Web client ID. Google ID tokens are accepted only
  # when their 'aud' claim matches this. Blank disables the /api/auth/google endpoint.
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  # State Address Register open data (data.gov.lv, CC-BY-4.0). auto-ingest turns
  # on the weekly refresh and the bootstrap ingest on an empty mirror.
  address-register:
    auto-ingest: ${ADDRESS_REGISTER_AUTO_INGEST:false}
    urls:
      novads: https://data.gov.lv/dati/dataset/6b06a7e8-dedf-4705-a47b-2a7c51177473/resource/c62c60bb-58d4-4f26-82c0-5b630769f9d1/download/aw_novads.csv
      pagasts: https://data.gov.lv/dati/dataset/6b06a7e8-dedf-4705-a47b-2a7c51177473/resource/6ba8c905-27a1-443a-b9c6-256a0777425b/download/aw_pagasts.csv
      pilseta: https://data.gov.lv/dati/dataset/6b06a7e8-dedf-4705-a47b-2a7c51177473/resource/ee02baa4-2bc3-4f77-a6cb-5427a3e9befe/download/aw_pilseta.csv
      ciems: https://data.gov.lv/dati/dataset/6b06a7e8-dedf-4705-a47b-2a7c51177473/resource/0d3810f4-1ac0-4fba-8b10-0188084a361b/download/aw_ciems.csv
      iela: https://data.gov.lv/dati/dataset/6b06a7e8-dedf-4705-a47b-2a7c51177473/resource/3c4ab802-76cf-433c-9c1c-89215e28d833/download/aw_iela.csv
      eka: https://data.gov.lv/dati/dataset/6b06a7e8-dedf-4705-a47b-2a7c51177473/resource/a510737a-18ce-400f-ad4b-04fce5228272/download/aw_eka.csv
      dziv: https://data.gov.lv/dati/dataset/6b06a7e8-dedf-4705-a47b-2a7c51177473/resource/b83be373-f444-4f50-9b98-28741845325e/download/aw_dziv.csv
  # VZD Cadastre open data (data.gov.lv, CC-BY-4.0): building year/floors and
  # per-apartment area, cross-checked against posted listing details.
  cadastre:
    auto-ingest: ${CADASTRE_AUTO_INGEST:false}
    urls:
      building: https://data.gov.lv/dati/dataset/be841486-4af9-4d38-aa14-6502a2ddb517/resource/9fe29b57-07cd-4458-b22c-b0b9f2bc8915/download/building.zip
      premise-group: https://data.gov.lv/dati/dataset/be841486-4af9-4d38-aa14-6502a2ddb517/resource/5d8b1cfa-1e67-4b77-a6ac-b4e37eba0d7e/download/premisegroup.zip
      parcel: ${CADASTRE_PARCEL_URL:https://data.gov.lv/dati/dataset/be841486-4af9-4d38-aa14-6502a2ddb517/resource/1618f19a-c818-4966-8183-a2e3c108597a/download/parcel.zip}
